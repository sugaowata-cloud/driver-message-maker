<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1557b0">
  <meta name="description" content="送迎業務で使う定型連絡文を、すばやく作成・コピーできるアプリです。">
  <title>運転連絡メーカー</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <header class="app-header">
    <button id="backButton" class="header-back hidden" type="button" aria-label="前の画面へ戻る">‹</button>
    <h1>🚗 運転連絡メーカー</h1>
    <button id="settingsButton" class="header-icon" type="button" aria-label="設定と履歴を開く">⚙️</button>
  </header>

  <main id="app" tabindex="-1"></main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <template id="homeTemplate">
    <section class="screen home-screen" aria-labelledby="homeHeading">
      <div class="welcome-row">
        <div><p class="eyebrow">かんたん・確実</p><h2 id="homeHeading">連絡文を作成</h2></div>
      </div>
      <div id="templateButtons" class="template-buttons"></div>
      <section class="history-preview" aria-labelledby="recentHeading">
        <div class="section-heading"><h2 id="recentHeading">直近の履歴</h2><button id="showAllHistory" class="text-button" type="button">すべて見る</button></div>
        <div id="recentHistory"></div>
      </section>
    </section>
  </template>

  <template id="composerTemplate">
    <section class="screen composer-screen" aria-labelledby="composerHeading">
      <div class="title-row"><span id="composerIcon" class="title-icon"></span><div><p class="eyebrow">文面作成</p><h2 id="composerHeading"></h2></div></div>
      <form id="messageForm" novalidate>
        <section id="situationCard" class="form-card">
          <h3>状況</h3>
          <div class="field"><label for="situation">連絡する状況</label><select id="situation" name="situation"></select></div>
        </section>
        <section class="form-card common-card">
          <h3>文頭と文末</h3>
          <div class="field-grid">
            <div class="field"><label for="opening">文頭</label><select id="opening" name="opening"></select></div>
            <div class="field"><label for="closing">文末</label><select id="closing" name="closing"></select></div>
          </div>
        </section>
        <div id="specificFields"></div>
        <div id="composerWarning"></div>
        <div class="bottom-spacer"></div>
      </form>
      <div class="sticky-action"><button id="generateButton" class="primary-button" type="submit" form="messageForm">文面を作成</button></div>
    </section>
  </template>

  <template id="resultTemplate">
    <section class="screen result-screen" aria-labelledby="resultHeading">
      <p class="eyebrow">生成結果</p><h2 id="resultHeading">送る前に確認</h2>
      <div class="field"><label for="resultText">生成された文面（直接修正できます）</label><textarea id="resultText" class="result-text" rows="14"></textarea></div>
      <div class="result-actions">
        <button id="shareButton" class="secondary-button hidden" type="button">共有画面を開く</button>
        <button id="editButton" class="secondary-button" type="button">内容を修正</button>
        <button id="resultHomeButton" class="ghost-button" type="button">最初に戻る</button>
      </div>
      <p class="privacy-note">この履歴はアプリ内で文面を生成・コピーした記録です。実際の送信証明ではありません。</p>
      <div class="bottom-spacer"></div>
      <div class="sticky-action"><button id="copyButton" class="primary-button" type="button">文面をコピー</button></div>
    </section>
  </template>

  <template id="settingsTemplate">
    <section class="screen settings-screen" aria-labelledby="settingsHeading">
      <p class="eyebrow">設定・履歴</p><h2 id="settingsHeading">使いやすく整える</h2>
      <nav class="tabs" aria-label="設定と履歴"><button class="tab active" data-tab="history" type="button">履歴</button><button class="tab" data-tab="templates" type="button">自由テンプレ</button><button class="tab" data-tab="settings" type="button">設定</button></nav>
      <div id="settingsContent"></div>
    </section>
  </template>

  <script src="app.js?v=8" defer></script>
</body>
</html>
